<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌾 星露谷 · 单词打卡</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Segoe UI', 'Courier New', monospace;
            background: #2d4a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background-image: radial-gradient(ellipse at 20% 80%, #3f6b41 0%, transparent 70%), radial-gradient(ellipse at 85% 25%, #5a3e2b 0%, transparent 55%), linear-gradient(145deg, #1f3a20, #3d613e);
        }
        .container {
            max-width: 560px;
            width: 100%;
            background: #fcf3e0;
            border-radius: 42px 42px 26px 26px;
            padding: 20px 18px 26px;
            box-shadow: 0 12px 0 #6b4f3a, 0 20px 34px rgba(0,0,0,0.6);
            border: 4px solid #ab8b6b;
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute;
            inset: 6px;
            border-radius: 38px 38px 20px 20px;
            border: 2px dashed #dcc7a8;
            pointer-events: none;
            opacity: 0.45;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 4px dashed #cdb38c;
        }
        .title-group { display: flex; align-items: center; gap: 6px; }
        .title-icon { font-size: 28px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2)); }
        .title-text {
            font-family: 'Press Start 2P','Courier New',monospace;
            font-size: 13px; color: #3b2a1a;
            text-shadow: 2px 2px 0 #ebd6b0; line-height: 1.2;
        }
        .title-text small { font-size: 8px; display: block; color: #6f523b; letter-spacing: 1px; text-shadow: none; }
        .streak-badge {
            background: #f5d742; padding: 4px 10px 4px 8px; border-radius: 40px;
            font-weight: bold; color: #3b2a1a;
            box-shadow: inset 0 -3px 0 #c49a2a, 0 4px 0 #7a5e2e;
            display: flex; align-items: center; gap: 4px;
            border: 2px solid #efc84a;
            font-family: 'Press Start 2P',monospace; font-size: 9px;
            transform: translateY(-2px);
        }
        .streak-badge span { font-size: 15px; }

        .stat-bar {
            display: flex; justify-content: space-around;
            background: #e7dcc8; border-radius: 60px;
            padding: 6px 4px; margin-bottom: 12px;
            border: 3px solid #cbb394;
            font-size: 12px; font-weight: 700; color: #3b2a1a;
        }
        .stat-item { display: flex; align-items: center; gap: 3px; }
        .stat-item .emoji { font-size: 14px; }
        .stat-value {
            background: #fcf3e0; padding: 0 8px; border-radius: 20px;
            font-family: 'Press Start 2P',monospace; font-size: 9px;
            line-height: 20px; border: 2px solid #b59773; min-width: 26px; text-align: center;
        }

        .daily-progress {
            background: #e7dcc8; border-radius: 40px; padding: 4px 12px 4px 14px;
            margin-bottom: 10px; border: 3px solid #cbb394;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; font-weight: 600; color: #3b2a1a;
        }
        .daily-progress .count { font-family: 'Press Start 2P',monospace; font-size: 10px; }
        .daily-progress .bar-wrap {
            flex: 1; margin: 0 8px; height: 10px;
            background: #dcccaf; border-radius: 20px;
            border: 2px solid #b3936e; overflow: hidden;
        }
        .daily-progress .bar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #f7d44a, #f5b342);
            transition: width 0.3s;
        }

        .card-wrapper { perspective: 1400px; margin-bottom: 10px; cursor: pointer; }
        .card {
            background: #fffbf0; border-radius: 28px; padding: 20px 14px 16px;
            border: 4px solid #c6aa82;
            box-shadow: 0 8px 0 #8f7456, inset 0 2px 8px rgba(255,215,150,0.3);
            text-align: center; min-height: 170px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative;
            background-image: radial-gradient(circle at 95% 92%, #efe3ce 0%, #fcf3e0 75%);
        }
        .card:active { transform: scale(0.98); box-shadow: 0 4px 0 #7d6349; }
        .word-en {
            font-family: 'Press Start 2P','Courier New',monospace;
            font-size: 22px; color: #312618; letter-spacing: 1px;
            word-break: break-word; line-height: 1.3; margin-bottom: 4px;
            text-shadow: 2px 2px 0 #eadbc0;
        }
        .word-phonetic {
            font-size: 13px; color: #6f523b; background: #ede3d0;
            padding: 2px 12px; border-radius: 20px; display: inline-block;
            margin-bottom: 6px; border: 2px solid #c9b087;
        }
        .word-cn {
            font-size: 18px; font-weight: 600; color: #593c23;
            background: #eddfcb; padding: 3px 16px; border-radius: 48px;
            display: inline-block; border: 2px solid #b59874;
            box-shadow: inset 0 2px 0 #fcf3e0; margin-top: 2px; max-width: 86%;
        }
        .example-sentence {
            margin-top: 8px; font-size: 13px; color: #5a4030;
            background: #f4ecdb; padding: 4px 12px; border-radius: 30px;
            border: 2px solid #c9b087; max-width: 94%;
        }
        .hint-flip { font-size: 10px; color: #846b4f; margin-top: 6px; background: #dbcbb4; padding: 2px 12px; border-radius: 30px; border: 2px solid #b99c79; }

        .action-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
        .btn {
            background: #f5e6cf; border: none; border-radius: 46px;
            padding: 7px 14px; font-weight: 700; font-size: 13px;
            color: #2f2115; border-bottom: 5px solid #ad8b68;
            box-shadow: 0 4px 0 #7d654a; cursor: pointer;
            transition: all 0.05s linear; display: inline-flex;
            align-items: center; gap: 4px; font-family: inherit;
            flex: 1 0 auto; justify-content: center;
        }
        .btn:active { transform: translateY(4px); border-bottom-width: 2px; box-shadow: 0 1px 0 #7d654a; }
        .btn-primary { background: #f7d44a; border-bottom-color: #c69f2e; box-shadow: 0 4px 0 #927522; color: #281f0e; }
        .btn-success { background: #78b159; border-bottom-color: #4d8032; box-shadow: 0 4px 0 #365e21; color: #faf7e8; }
        .btn-warning { background: #e09f5e; border-bottom-color: #b07637; box-shadow: 0 4px 0 #7a5425; color: #2d1d0e; }
        .btn-secondary { background: #dac29b; border-bottom-color: #a58662; box-shadow: 0 4px 0 #735d43; }
        .btn:disabled { opacity: 0.6; transform: translateY(2px); border-bottom-width: 3px; box-shadow: 0 2px 0 #7d654a; cursor: not-allowed; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 999;
            justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fcf3e0; border-radius: 30px; padding: 24px 20px;
            max-width: 380px; width: 90%; border: 4px solid #ab8b6b;
            box-shadow: 0 12px 0 #6b4f3a; text-align: center;

        .modal .spell-cn { font-size: 20px; font-weight: 600; color: #593c23; margin-bottom: 8px; }
        .modal input {
            width: 76%; padding: 8px 12px; font-size: 16px;
            border: 4px solid #b59773; border-radius: 40px;
            background: #fffbf0; outline: none; text-align: center;
            font-family: 'Press Start 2P',monospace; letter-spacing: 2px;
        }
        .modal input:focus { border-color: #f7d44a; }
        .modal .result { margin-top: 10px; font-size: 16px; font-weight: 600; min-height: 26px; }
        .modal .btn-group { margin-top: 14px; display: flex; gap: 8px; justify-content: center; }

        .progress-area { margin-top: 4px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: #412f1d; margin-bottom: 2px; }
        .progress-track { height: 12px; background: #dcccaf; border-radius: 40px; border: 3px solid #b3936e; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #f7d44a, #f5b342); border-radius: 40px; transition: width 0.3s; }

        @media (max-width: 440px) {
            .container { padding: 12px 10px 18px; }
            .word-en { font-size: 18px; }
            .word-cn { font-size: 15px; }
            .btn { font-size: 11px; padding: 5px 10px; }
            .modal input { width: 90%; }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="header">
        <div class="title-group">
            <span class="title-icon">🌾</span>
            <div class="title-text">单词·谷<small>✦ 高一必修588 ✦</small></div>

    </div>

        <div class="stat-item"><span class="emoji">🎯</span> 今日 <span class="stat-value" id="todayCount">0</span></div>
    </div>

    <div class="daily-progress">
        <span>🌞 今日任务</span>
        <div class="bar-wrap"><div class="bar-fill" id="dailyFill" style="width:0%"></div></div>
        <span class="count" id="dailyCount">0/30</span>
    </div>

    <div class="card-wrapper" id="cardWrapper">
        <div class="card" id="wordCard">
            <div class="word-en" id="wordEn">loading...</div>
            <div class="word-phonetic" id="wordPhonetic">/ˈləʊdɪŋ/</div>
            <div class="word-cn" id="wordCn">加载中</div>
            <div class="example-sentence" id="exampleSentence">请稍候，正在准备单词…</div>
            <div class="hint-flip">👆 点击卡片翻转 / 下一词</div>
        </div>
    </div>

    <div class="action-row">
        <button class="btn btn-primary" id="nextBtn">⏩ 下一个</button>
        <button class="btn btn-success" id="masterBtn">🌟 记住了</button>
        <button class="btn btn-warning" id="spellBtn">✍️ 拼写</button>
        <button class="btn btn-secondary" id="resetTodayBtn">🔄 重置今日</button>
    </div>

    <div class="progress-area">
        <div class="progress-label">
            <span>🌱 总进度</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>
</div>

<!-- 拼写模态框 -->
<div class="modal-overlay" id="spellModal">

        <p>根据中文写出英文单词：</p>
        <div id="spellCn" style="font-weight: bold; font-size: 1.3em; margin: 10px 0;"></div>
        <div class="spell-progress" id="spellProgress">第 1 / 20 个</div>
        <input type="text" id="spellInput" placeholder="输入英文单词" autocomplete="off" />
        <div class="result" id="spellResult"></div>
        <div class="btn-group">
            <button class="btn btn-primary" id="submitSpell">提交</button>
            <button class="btn btn-secondary" id="closeSpell">取消</button>
        </div>
    </div>
</div>

const CONFIG = { DAILY_GOAL: 30, REVIEW_INTERVAL: 3 };

let state = {
    currentIndex: 0,
    todayMastered: new Set(),
    masteredTimestamps: {},
    streak: 0,
    todayTasks: [],
    allWords: WORD_BANK,
    spellQueue: [],
    spellIndex: 0
};

const el = {
    wordEn: document.getElementById('wordEn'),
    wordPhonetic: document.getElementById('wordPhonetic'),
    wordCn: document.getElementById('wordCn'),
    exampleSentence: document.getElementById('exampleSentence'),
    card: document.getElementById('wordCard'),
    nextBtn: document.getElementById('nextBtn'),
    masterBtn: document.getElementById('masterBtn'),
    spellBtn: document.getElementById('spellBtn'),
    resetTodayBtn: document.getElementById('resetTodayBtn'),
    totalWords: document.getElementById('totalWords'),
    masteredCount: document.getElementById('masteredCount'),
    todayCount: document.getElementById('todayCount'),
    dailyCount: document.getElementById('dailyCount'),
    dailyFill: document.getElementById('dailyFill'),
    streakDisplay: document.getElementById('streakDisplay'),
    progressFill: document.getElementById('progressFill'),
    progressPercent: document.getElementById('progressPercent'),
    spellModal: document.getElementById('spellModal'),
    spellCn: document.getElementById('spellCn'),
    spellInput: document.getElementById('spellInput'),
    spellResult: document.getElementById('spellResult'),
    submitSpell: document.getElementById('submitSpell'),
    closeSpell: document.getElementById('closeSpell')
};

function loadData() {
    const today = new Date().toLocaleDateString();
    const saved = localStorage.getItem('stardew588State');
    if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed.date === today) {
            state.todayMastered = new Set(parsed.todayMastered || []);
            state.masteredTimestamps = parsed.masteredTimestamps || {};
            state.streak = parsed.streak || 0;
        } else {
            state.masteredTimestamps = parsed.masteredTimestamps || {};
            state.streak = parsed.streak || 0;
            state.todayMastered = new Set();
            const lastDate = new Date(parsed.date);
            const now = new Date(today);
            const diffDays = Math.floor((now - lastDate) / (86400000));
            if (diffDays === 1) state.streak++;
            else if (diffDays > 1) state.streak = 0;
        }
    }
}

function saveData() {
    const data = {
        date: new Date().toLocaleDateString(),
        todayMastered: Array.from(state.todayMastered),
        masteredTimestamps: state.masteredTimestamps,
        streak: state.streak
    };
    localStorage.setItem('stardew588State', JSON.stringify(data));
}

function buildDailyTasks() {
    const all = state.allWords;
    const candidates = all.filter(w => {
        if (state.todayMastered.has(w.en)) return false;
        if (state.masteredTimestamps[w.en]) {
            const last = new Date(state.masteredTimestamps[w.en]);
            const now = new Date();
            const days = Math.floor((now - last) / 86400000);
            if (days < CONFIG.REVIEW_INTERVAL) return false;
        }
        return true;
    });
    candidates.sort((a, b) => b.freqRank - a.freqRank);
    state.todayTasks = candidates.slice(0, CONFIG.DAILY_GOAL);
}

function showWord(index) {
    if (!state.todayTasks || state.todayTasks.length === 0) {
        el.wordEn.textContent = "🎉";
        el.wordCn.textContent = "今日任务已完成！";
        el.wordPhonetic.textContent = "";
        el.exampleSentence.textContent = "太棒了，休息一下吧！";
        return;
    }
    const realIndex = index % state.todayTasks.length;
    const word = state.todayTasks[realIndex];
    el.wordEn.textContent = word.en;
    el.wordPhonetic.textContent = word.phonetic;
    el.wordCn.textContent = word.cn;
    el.exampleSentence.textContent = word.example || "（暂无例句）";
    state.currentIndex = realIndex;
}

function goToNext() {
    showWord(state.currentIndex + 1);
}

function markMastered() {
    const currentWord = state.todayTasks[state.currentIndex];
    if (!currentWord) return;
    state.todayMastered.add(currentWord.en);
    state.masteredTimestamps[currentWord.en] = new Date().toISOString();
    saveData();
    updateStats();
    goToNext();
}

function updateStats() {
    const todayDone = state.todayMastered.size;
    const percent = Math.min(100, (todayDone / CONFIG.DAILY_GOAL) * 100);
    el.dailyFill.style.width = percent + '%';
    el.dailyCount.textContent = `${todayDone}/${CONFIG.DAILY_GOAL}`;
    const totalMastered = Object.keys(state.masteredTimestamps).length;
    el.masteredCount.textContent = totalMastered;
    el.totalWords.textContent = state.allWords.length;
    el.todayCount.textContent = todayDone;
    el.streakDisplay.textContent = state.streak;
    const overallPercent = state.allWords.length ? Math.round((totalMastered / state.allWords.length) * 100) : 0;
    el.progressFill.style.width = overallPercent + '%';
    el.progressPercent.textContent = overallPercent + '%';
}

// 拼写测试
function startSpellTest() {
    const masteredKeys = Object.keys(state.masteredTimestamps);
    if (masteredKeys.length === 0) {
        // 改为在拼写模态框内显示提示
        el.spellCn.textContent = "暂无已掌握单词，请先学习！";
        el.spellInput.style.display = "none";
        el.submitSpell.style.display = "none";
        el.spellResult.textContent = "";
        el.spellModal.classList.add('active');
        return;
    }
    // 恢复正常输入
    el.spellInput.style.display = "";
    el.submitSpell.style.display = "";
    const shuffled = masteredKeys.sort(() => Math.random() - 0.5);
    const selected = shuffled.slice(0, 20);
    state.spellQueue = selected.map(key =>
        state.allWords.find(w => w.en === key)
    ).filter(Boolean);
    state.spellIndex = 0;
    showCurrentSpell();
    el.spellModal.classList.add('active');
    el.spellInput.focus();
}

function showCurrentSpell() {
    if (state.spellIndex >= state.spellQueue.length) {
        el.spellResult.innerHTML = "🎉 全部拼写完成！";
        el.spellResult.style.color = "#4caf50";
        setTimeout(() => el.spellModal.classList.remove('active'), 1200);
        return;
    }
    const word = state.spellQueue[state.spellIndex];
    el.spellCn.textContent = word.cn;
    el.spellInput.value = "";
    el.spellResult.textContent = "";
    const progEl = document.getElementById('spellProgress');
    if (progEl) progEl.textContent = `第 ${state.spellIndex + 1} / ${state.spellQueue.length} 个`;
}

function checkSpelling() {
    const word = state.spellQueue[state.spellIndex];
    if (!word) return;
    const userInput = el.spellInput.value.trim().toLowerCase();
    const correct = word.en.toLowerCase();
    if (userInput === "") { el.spellResult.textContent = "请输入单词！"; return; }
    if (userInput === correct) {
        el.spellResult.innerHTML = "✅ 正确！";
        el.spellResult.style.color = "#4caf50";
        setTimeout(() => { state.spellIndex++; showCurrentSpell(); }, 600);
    } else {
        el.spellResult.innerHTML = `❌ 错误！正确答案：${word.en}`;
        el.spellResult.style.color = "#f44336";
        setTimeout(() => { state.spellIndex++; showCurrentSpell(); }, 1200);
    }
}

// 事件绑定
el.nextBtn.addEventListener('click', goToNext);
el.masterBtn.addEventListener('click', markMastered);
el.spellBtn.addEventListener('click', startSpellTest);
el.submitSpell.addEventListener('click', checkSpelling);
el.closeSpell.addEventListener('click', () => el.spellModal.classList.remove('active'));
el.resetTodayBtn.addEventListener('click', () => {
    if (confirm("确定要重置今日任务吗？这将清空今天的打卡记录。")) {
        state.todayMastered.clear();
        saveData();
        buildDailyTasks();
        showWord(0);
        updateStats();
    }
});
el.card.addEventListener('click', goToNext);

document.addEventListener('keydown', (e) => {
    if (el.spellModal.classList.contains('active')) return;
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); goToNext(); }
    if (e.key === 'ArrowRight') markMastered();
});

// 初始化
loadData();
buildDailyTasks();
showWord(0);
updateStats();
</script>
</body>
</html>
